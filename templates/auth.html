<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPilot AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #080810; --surface: #10101e; --surface2: #16162a; --accent: #7c6af7; --accent2: #f76a8c; --text: #f0f0ff; --muted: #8888aa; --border: rgba(124,106,247,0.18); --input-bg: #0d0d1f; --error: #f76a8c; --success: #6af7b8; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .grid-bg { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
  .glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .glow-1 { width: 500px; height: 500px; background: rgba(124,106,247,0.1); top: -150px; left: -100px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(247,106,140,0.07); bottom: -150px; right: -100px; }
  .card { position: relative; z-index: 10; background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 48px 40px; width: 100%; max-width: 440px; animation: fadeUp 0.5s ease both; }
  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 32px; text-decoration: none; color: var(--text); display: block; }
  .logo span { color: var(--accent); }
  .tabs { display: flex; background: var(--surface2); border-radius: 14px; padding: 4px; margin-bottom: 32px; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 10px; transition: all 0.2s; color: var(--muted); border: none; background: transparent; font-family: 'DM Sans', sans-serif; }
  .tab.active { background: var(--accent); color: white; }
  .form-section { display: none; }
  .form-section.active { display: block; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; outline: none; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .btn-submit { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; margin-top: 8px; }
  .btn-submit:hover { background: #6a58e0; transform: translateY(-1px); }
  .divider { text-align: center; color: var(--muted); font-size: 13px; margin: 20px 0; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
  .msg.error { background: rgba(247,106,140,0.1); border: 1px solid rgba(247,106,140,0.3); color: var(--error); display: block; }
  .msg.success { background: rgba(106,247,184,0.1); border: 1px solid rgba(106,247,184,0.3); color: var(--success); display: block; }
  .back-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
  .back-link a { color: var(--accent); text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 480px) { .card { padding: 36px 24px; } }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="card">
  <a href="/" class="logo">Chat<span>Pilot</span> AI</a>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Log in</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>
  <div class="form-section active" id="loginForm">
    <div id="loginMsg"></div>
    <div class="form-group"><label>Email address</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter your password"/></div>
    <button class="btn-submit" onclick="handleLogin()">Log in</button>
    <div class="divider">or</div>
    <p style="text-align:center; color:var(--muted); font-size:13px;">Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--accent);">Register here</a></p>
  </div>
  <div class="form-section" id="registerForm">
    <div id="registerMsg"></div>
    <div class="form-group"><label>Full name</label><input type="text" id="regName" placeholder="Your name"/></div>
    <div class="form-group"><label>Username</label><input type="text" id="regUsername" placeholder="@username"/></div>
    <div class="form-group"><label>Email address</label><input type="email" id="regEmail" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Min 6 characters"/></div>
    <button class="btn-submit" onclick="handleRegister()">Create account</button>
  </div>
  <div class="back-link"><a href="/">← Back to home</a></div>
</div>
<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => { t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')); });
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
}
function showMsg(id, text, type) { const el = document.getElementById(id); el.textContent = text; el.className = 'msg ' + type; }
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!email || !password) { showMsg('loginMsg', 'Please fill in all fields.', 'error'); return; }
  fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) })
  .then(r => r.json()).then(data => { if (data.success) { window.location.href = '/chat'; } else { showMsg('loginMsg', data.message || 'Login failed.', 'error'); } })
  .catch(() => showMsg('loginMsg', 'Server error. Try again.', 'error'));
}
function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  if (!name || !username || !email || !password) { showMsg('registerMsg', 'Please fill in all fields.', 'error'); return; }
  if (password.length < 6) { showMsg('registerMsg', 'Password must be at least 6 characters.', 'error'); return; }
  fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, username, email, password }) })
  .then(r => r.json()).then(data => { if (data.success) { showMsg('registerMsg', 'Account created! Logging you in...', 'success'); setTimeout(() => window.location.href = '/chat', 1500); } else { showMsg('registerMsg', data.message || 'Registration failed.', 'error'); } })
  .catch(() => showMsg('registerMsg', 'Server error. Try again.', 'error'));
}
</script>
</body>
</html>
