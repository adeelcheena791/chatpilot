<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPilot — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#e8192c;
  --red2:#ff3347;
  --dark:#080508;
  --surface:#110d0e;
  --surface2:#170f11;
  --surface3:#1f1416;
  --text:#f5f0f0;
  --muted:#7a6063;
  --border:rgba(232,25,44,0.15);
  --sent-bg:#e8192c;
  --recv-bg:#170f11;
}

body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);height:100vh;display:flex;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:280px;min-width:280px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;
  z-index:10;
}
.sidebar::after{
  content:'';
  position:absolute;
  top:0;bottom:0;right:0;
  width:1px;
  background:linear-gradient(180deg, transparent, var(--red) 40%, transparent);
  opacity:0.4;
}

.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.logo-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:logoPulse 2s infinite;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,25,44,0.6);}50%{box-shadow:0 0 0 7px rgba(232,25,44,0);}}
.logo span{color:var(--red);}

.user-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:14px;margin-bottom:12px;
}

.avatar{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;flex-shrink:0;font-family:'Bebas Neue',sans-serif;
  letter-spacing:1px;
}

.search-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;padding:9px 14px;
  display:flex;align-items:center;gap:8px;
  transition:border-color 0.2s;
}
.search-box:focus-within{border-color:rgba(232,25,44,0.4);}
.search-box input{
  background:none;border:none;outline:none;
  color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;flex:1;
}
.search-box input::placeholder{color:var(--muted);}

.sidebar-section{padding:12px 16px 8px;flex:1;overflow-y:auto;}
.sidebar-section::-webkit-scrollbar{width:3px;}
.sidebar-section::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.section-title{
  font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;
}

.contact-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 11px;border-radius:13px;
  cursor:pointer;transition:background 0.15s;margin-bottom:2px;
  border:1px solid transparent;
}
.contact-item:hover{background:var(--surface2);}
.contact-item.active{
  background:var(--surface2);
  border-color:var(--border);
  border-left:2px solid var(--red);
}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:14px;font-weight:500;}
.contact-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.add-friend-btn{
  margin:8px 16px 16px;
  background:rgba(232,25,44,0.08);
  border:1px dashed rgba(232,25,44,0.3);
  border-radius:12px;padding:11px;
  text-align:center;cursor:pointer;
  color:var(--red);font-size:13px;font-weight:500;
  transition:background 0.2s;
}
.add-friend-btn:hover{background:rgba(232,25,44,0.15);}

/* MAIN */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

.chat-topbar{
  padding:13px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
  position:relative;
}
.chat-topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  opacity:0.35;
}

.chat-user{display:flex;align-items:center;gap:12px;}
.chat-user-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.chat-user-status{font-size:11px;color:var(--muted);}
.online-dot{width:7px;height:7px;background:#5ce65c;border-radius:50%;display:inline-block;margin-right:5px;box-shadow:0 0 6px rgba(92,230,92,0.6);}

.topbar-actions{display:flex;align-items:center;gap:10px;}

.bell-btn{
  display:none;
  background:rgba(232,25,44,0.12);border:1px solid rgba(232,25,44,0.3);
  border-radius:50px;padding:7px 14px;font-size:13px;color:var(--red);
  cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;
}

.ai-toggle-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:50px;padding:7px 14px;cursor:pointer;
  transition:border-color 0.2s, background 0.2s;
}
.ai-toggle-wrap.on{border-color:var(--red);background:rgba(232,25,44,0.1);}

.ai-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.5px;}
.ai-label.on{color:var(--red);}

.toggle-switch{
  width:34px;height:18px;background:var(--surface3);
  border-radius:20px;position:relative;transition:background 0.2s;
}
.toggle-switch.on{background:var(--red);}
.toggle-switch::after{
  content:'';position:absolute;width:12px;height:12px;
  background:white;border-radius:50%;top:3px;left:3px;
  transition:left 0.2s;
}
.toggle-switch.on::after{left:19px;}

.tone-select{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;padding:7px 10px;
  font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;outline:none;
}
.tone-select:focus{border-color:rgba(232,25,44,0.4);}

/* MESSAGES */
.messages-area{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--dark);
}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(232,25,44,0.2);border-radius:4px;}

.msg-group{display:flex;flex-direction:column;gap:3px;}
.msg-group.sent{align-items:flex-end;}
.msg-group.received{align-items:flex-start;}

.bubble{
  max-width:66%;padding:10px 16px;border-radius:18px;
  font-size:14px;line-height:1.55;word-break:break-word;
  animation:bubblePop 0.18s ease;
}
@keyframes bubblePop{from{opacity:0;transform:scale(0.94);}to{opacity:1;transform:scale(1);}}

.msg-group.sent .bubble{
  background:var(--sent-bg);
  border-bottom-right-radius:4px;
  box-shadow:0 2px 16px rgba(232,25,44,0.25);
}
.msg-group.received .bubble{
  background:var(--recv-bg);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}

.msg-time{font-size:10px;color:var(--muted);padding:0 12px;}

/* AI PANEL */
.ai-panel{
  background:var(--surface);border-top:1px solid var(--border);
  padding:12px 20px;display:none;
}
.ai-panel.visible{display:block;}
.ai-panel-header{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.ai-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pls 2s infinite;}
@keyframes pls{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.5);}}

.suggestions-row{display:flex;gap:8px;flex-wrap:wrap;}
.suggestion{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:20px;padding:7px 15px;
  font-size:13px;cursor:pointer;transition:all 0.15s;
  font-family:'Outfit',sans-serif;
}
.suggestion:hover{background:var(--red);border-color:var(--red);}

.ai-thinking{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--muted);
}
.thinking-dots span{
  display:inline-block;width:5px;height:5px;
  background:var(--red);border-radius:50%;
  animation:dot 1.2s infinite;margin:0 2px;
}
.thinking-dots span:nth-child(2){animation-delay:0.2s;}
.thinking-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dot{0%,100%{opacity:0.2;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}

/* INPUT */
.input-area{
  padding:13px 20px 16px;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:10px;
}
.input-wrap{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:16px;display:flex;align-items:center;
  padding:4px 4px 4px 16px;transition:border-color 0.2s;
}
.input-wrap:focus-within{border-color:rgba(232,25,44,0.5);}
#msgInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;
  padding:9px 0;resize:none;
}
#msgInput::placeholder{color:var(--muted);}

.send-btn{
  width:42px;height:42px;background:var(--red);border:none;
  border-radius:13px;color:white;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.15s;flex-shrink:0;
  box-shadow:0 2px 14px rgba(232,25,44,0.35);
}
.send-btn:hover{background:#c8101e;transform:scale(1.06);}
.send-btn:active{transform:scale(0.97);}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.82);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;padding:30px 28px;width:100%;max-width:400px;
  animation:fadeUp 0.28s ease both;position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:18px;}

.modal-tabs{
  display:flex;background:var(--surface2);border-radius:11px;
  padding:4px;margin-bottom:20px;
}
.modal-tab{
  flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;
  cursor:pointer;border-radius:7px;border:none;background:transparent;
  color:var(--muted);font-family:'Outfit',sans-serif;transition:all 0.2s;letter-spacing:0.3px;
}
.modal-tab.active{background:var(--red);color:white;}

.modal-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;padding:12px 16px;font-size:14px;color:var(--text);
  font-family:'Outfit',sans-serif;outline:none;margin-bottom:12px;
  transition:border-color 0.2s;
}
.modal-input:focus{border-color:rgba(232,25,44,0.45);}
.modal-input::placeholder{color:var(--muted);}

.search-result{
  display:flex;align-items:center;gap:12px;padding:11px;
  background:var(--surface2);border-radius:13px;margin-bottom:8px;
  border:1px solid var(--border);
}
.search-result-info{flex:1;}
.search-result-name{font-size:14px;font-weight:500;}
.search-result-username{font-size:12px;color:var(--muted);}
.btn-add-small{
  background:var(--red);color:white;border:none;border-radius:9px;
  padding:7px 15px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;
  white-space:nowrap;transition:background 0.2s;
}
.btn-add-small:hover{background:#c8101e;}
.btn-add-small:disabled{background:var(--surface3);color:var(--muted);cursor:not-allowed;}

.profile-link-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;padding:13px 15px;font-size:13px;
  color:var(--red);word-break:break-all;margin-bottom:16px;
}

.req-card{
  background:rgba(232,25,44,0.07);border:1px solid rgba(232,25,44,0.2);
  border-radius:16px;padding:16px;text-align:center;margin:6px 0;
}
.req-card p{font-size:14px;margin-bottom:12px;}
.req-accept-btn{
  background:var(--red);color:white;border:none;border-radius:10px;
  padding:9px 24px;cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;transition:background 0.2s;
}
.req-accept-btn:hover{background:#c8101e;}
.req-accept-btn:disabled{background:var(--surface3);color:var(--muted);cursor:not-allowed;}

.btn-close-modal{
  width:100%;padding:11px;margin-top:12px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);border-radius:11px;font-size:14px;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:background 0.2s;
}
.btn-close-modal:hover{background:var(--surface3);}

/* HAMBURGER */
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;}
.sidebar-close{
  display:none;position:absolute;top:16px;right:14px;
  background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;
}

/* EMPTY STATE */
.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;color:var(--muted);
  padding:40px;text-align:center;
}
.empty-state .big{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:rgba(232,25,44,0.25);}

@media(max-width:768px){
  .sidebar{position:fixed;inset:0;z-index:50;width:100%;max-width:300px;transform:translateX(-100%);transition:transform 0.3s;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-close{display:block;}
  .hamburger{display:block;}
  .tone-select{display:none;}
  .bubble{max-width:84%;}
  .input-area{padding:10px 12px 14px;}
  #msgInput{font-size:16px;}
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  <div class="sidebar-header">
    <div class="logo"><div class="logo-dot"></div>Chat<span>Pilot</span></div>
    <div class="user-card">
      <div class="avatar" id="currentUserInitials" style="width:36px;height:36px;font-size:13px;background:rgba(232,25,44,0.15);color:var(--red);">ME</div>
      <div style="flex:1;">
        <div id="currentUserName" style="font-size:14px;font-weight:500;">Loading...</div>
        <div style="font-size:11px;color:#5ce65c;"><span class="online-dot"></span>Online</div>
      </div>
      <a href="/logout" style="color:var(--muted);font-size:12px;text-decoration:none;letter-spacing:0.5px;">Logout</a>
    </div>
    <div class="search-box">
      <span style="color:var(--muted);font-size:13px;">🔍</span>
      <input type="text" placeholder="Search friends..." oninput="filterChats(this.value)"/>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="section-title">Friends</div>
    <div id="friendsContainer"><div style="color:var(--muted);font-size:13px;padding:8px 0;">Loading...</div></div>
  </div>
  <div class="add-friend-btn" onclick="openFriendModal()">+ Add Friends / Share Profile</div>
</div>

<div class="chat-main">
  <div class="chat-topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="chat-user">
        <div class="avatar" id="chatAvatar" style="width:36px;height:36px;font-size:14px;background:rgba(232,25,44,0.15);color:var(--red);">?</div>
        <div>
          <div class="chat-user-name" id="chatName">Select a friend</div>
          <div class="chat-user-status"><span class="online-dot"></span>Online</div>
        </div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="bell-btn" id="requestBell" onclick="showRequestsPanel()">🔔 Friend Request</div>
      <select class="tone-select" id="toneSelect" onchange="onToneChange()">
        <option value="friend">😊 Friend</option>
        <option value="teacher">🎓 Teacher</option>
        <option value="business">💼 Business</option>
      </select>
      <div class="ai-toggle-wrap on" id="aiToggleWrap" onclick="toggleAI()">
        <span class="ai-label on" id="aiLabel">AI ON</span>
        <div class="toggle-switch on" id="toggleSwitch"></div>
      </div>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state">
      <div class="big">CHATPILOT</div>
      <div style="font-size:14px;">👋 Select a friend to start chatting</div>
    </div>
  </div>

  <div class="ai-panel visible" id="aiPanel">
    <div class="ai-panel-header"><div class="ai-dot"></div>AI Suggestions</div>
    <div class="suggestions-row" id="suggestionsRow">
      <button class="suggestion" onclick="useSuggestion(this)">Hey! How are you? 😊</button>
      <button class="suggestion" onclick="useSuggestion(this)">What's up?</button>
      <button class="suggestion" onclick="useSuggestion(this)">Let's catch up! 👀</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="Type a message..." rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    </div>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- FRIEND MODAL -->
<div class="modal-overlay" id="friendModal">
  <div class="modal">
    <h3>Add Friends</h3>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchModalTab('search')">🔍 Search</button>
      <button class="modal-tab" onclick="switchModalTab('share')">🔗 Share</button>
    </div>
    <div id="searchTab">
      <input class="modal-input" type="text" id="usernameSearch" placeholder="Search @username..." oninput="searchUsername(this.value)"/>
      <div id="searchResults"></div>
    </div>
    <div id="shareTab" style="display:none;">
      <p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Share this link — anyone can add you!</p>
      <div class="profile-link-box" id="profileLink">Loading...</div>
      <button style="width:100%;padding:12px;background:var(--red);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;" onclick="copyLink()">Copy Link</button>
    </div>
    <button class="btn-close-modal" onclick="closeFriendModal()">Close</button>
  </div>
</div>

<script>
// ─── GLOBALS ──────────────────────────────────────────────────────
let aiOn = true;
let currentUser = {};
let currentChatEmail = '';
let pendingRequests = [];
const socket = io();

// ─── LOAD CURRENT USER ────────────────────────────────────────────
fetch('/get_user').then(r=>r.json()).then(data=>{
  if(data.success){
    currentUser = data.user;
    document.getElementById('currentUserName').textContent = currentUser.name;
    document.getElementById('currentUserInitials').textContent = currentUser.name.substring(0,2).toUpperCase();
  }
});

// ─── AI TOGGLE ────────────────────────────────────────────────────
function toggleAI(){
  aiOn = !aiOn;
  document.getElementById('toggleSwitch').classList.toggle('on', aiOn);
  document.getElementById('aiToggleWrap').classList.toggle('on', aiOn);
  document.getElementById('aiLabel').textContent = aiOn ? 'AI ON' : 'AI OFF';
  document.getElementById('aiLabel').classList.toggle('on', aiOn);
  document.getElementById('aiPanel').classList.toggle('visible', aiOn);
}

// ─── MESSAGING ────────────────────────────────────────────────────
function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentChatEmail) return;
  addMessage(text, 'sent');
  socket.emit('message', {text, room: currentChatEmail, tone: document.getElementById('toneSelect').value});
  input.value = '';
  autoResize(input);
  if(aiOn) setTimeout(()=>getAISuggestions(text), 300);
}

function addMessage(text, type){
  const area = document.getElementById('messagesArea');
  // Remove empty state if present
  const empty = area.querySelector('.empty-state');
  if(empty) empty.remove();

  const group = document.createElement('div');
  group.className = 'msg-group ' + type;
  const now = new Date();
  const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  group.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="msg-time">${time}</div>`;
  area.appendChild(group);
  area.scrollTop = area.scrollHeight;
}

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function useSuggestion(btn){
  document.getElementById('msgInput').value = btn.textContent.trim();
  sendMessage();
}

// ─── AI SUGGESTIONS (fixed — single definition, no duplicate) ─────
function getAISuggestions(lastMsg){
  if(!aiOn) return;
  const tone = document.getElementById('toneSelect').value;
  const row = document.getElementById('suggestionsRow');
  row.innerHTML = `<div class="ai-thinking">Thinking <div class="thinking-dots"><span></span><span></span><span></span></div></div>`;

  // Build conversation from DOM
  const messages = [];
  document.querySelectorAll('.msg-group').forEach(group=>{
    if(group.classList.contains('req-card')) return;
    const bubble = group.querySelector('.bubble');
    if(!bubble) return;
    const isMe = group.classList.contains('sent');
    const text = bubble.textContent.trim();
    if(text){
      messages.push({ role: isMe ? 'assistant' : 'user', content: text });
    }
  });

  if(messages.length === 0){
    messages.push({role: 'user', content: lastMsg || 'hello'});
  }

  const recentMessages = messages.slice(-6);

  fetch('/get_suggestions',{
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({messages: recentMessages, tone})
  })
  .then(r=>r.json())
  .then(data=>{
    row.innerHTML = '';
    const suggestions = data.suggestions || [];
    if(suggestions.length === 0){
      row.innerHTML = '<span style="color:var(--muted);font-size:13px;">No suggestions available.</span>';
      return;
    }
    suggestions.forEach(s=>{
      const btn = document.createElement('button');
      btn.className = 'suggestion';
      btn.textContent = s;
      btn.onclick = ()=>useSuggestion(btn);
      row.appendChild(btn);
    });
  })
  .catch(()=>{
    row.innerHTML = '<span style="color:var(--muted);font-size:13px;">Could not get suggestions.</span>';
  });
}

function onToneChange(){ if(aiOn) getAISuggestions(''); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ─── OPEN CHAT ────────────────────────────────────────────────────
function openChat(name, initials, email){
  currentChatEmail = email || '';
  document.getElementById('chatName').textContent = name;
  document.getElementById('chatAvatar').textContent = initials;
  document.querySelectorAll('.contact-item').forEach(c=>c.classList.remove('active'));

  const tone = document.getElementById('toneSelect');
  if(name.match(/Dr\.|Prof/i)) tone.value='teacher';
  else if(name.match(/Corp|Inc|Ltd/i)) tone.value='business';
  else tone.value='friend';

  const area = document.getElementById('messagesArea');
  area.innerHTML = '';

  if(window.innerWidth <= 768) toggleSidebar();
  if(email) socket.emit('join', {room: email});
}

// ─── LOAD FRIENDS ─────────────────────────────────────────────────
function loadFriends(){
  fetch('/get_friends').then(r=>r.json()).then(data=>{
    const container = document.getElementById('friendsContainer');
    if(data.success && data.friends && data.friends.length > 0){
      container.innerHTML = '';
      data.friends.forEach(friend=>{
        const initials = friend.name.substring(0,2).toUpperCase();
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.dataset.name = friend.name.toLowerCase();
        div.innerHTML = `
          <div class="avatar" style="background:rgba(232,25,44,0.15);color:var(--red);width:40px;height:40px;font-size:13px;">${initials}</div>
          <div class="contact-info">
            <div class="contact-name">${friend.name}</div>
            <div class="contact-preview">@${friend.username}</div>
          </div>`;
        div.onclick = function(){
          document.querySelectorAll('.contact-item').forEach(c=>c.classList.remove('active'));
          div.classList.add('active');
          openChat(friend.name, initials, friend.email);
        };
        container.appendChild(div);
      });
    } else {
      container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No friends yet — click below to add!</div>';
    }
  }).catch(()=>{
    document.getElementById('friendsContainer').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">Failed to load friends.</div>';
  });
}

function filterChats(query){
  document.querySelectorAll('.contact-item').forEach(item=>{
    const name = item.dataset.name || '';
    item.style.display = name.includes(query.toLowerCase()) ? 'flex' : 'none';
  });
}

// ─── FRIEND REQUESTS ──────────────────────────────────────────────
function loadFriendRequests(){
  fetch('/get_friend_requests').then(r=>r.json()).then(data=>{
    const bell = document.getElementById('requestBell');
    if(data.success && data.requests && data.requests.length > 0){
      pendingRequests = data.requests;
      bell.style.display = 'block';
    } else {
      bell.style.display = 'none';
      pendingRequests = [];
    }
  });
}

function showRequestsPanel(){
  document.getElementById('requestBell').style.display = 'none';
  pendingRequests.forEach(req=>{
    const id = 'req-' + req.email.replace(/[@.]/g,'');
    if(document.getElementById(id)) return;
    const area = document.getElementById('messagesArea');
    const empty = area.querySelector('.empty-state');
    if(empty) empty.remove();
    const div = document.createElement('div');
    div.id = id; div.className = 'req-card';
    const p = document.createElement('p');
    p.innerHTML = `🤝 <strong>${req.name}</strong> (@${req.username}) wants to be your friend!`;
    const btn = document.createElement('button');
    btn.className = 'req-accept-btn'; btn.textContent = 'Accept';
    btn.onclick = ()=>acceptFriend(req.email, btn, div);
    div.appendChild(p); div.appendChild(btn);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  });
}

function acceptFriend(email, btn, div){
  btn.textContent = 'Accepting...'; btn.disabled = true;
  fetch('/accept_friend',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email})
  }).then(r=>r.json()).then(data=>{
    if(data.success){
      div.innerHTML = '<p style="color:#5ce65c;padding:8px;">✅ Friend added!</p>';
      setTimeout(()=>{ loadFriends(); loadFriendRequests(); }, 600);
    } else {
      btn.textContent='Accept'; btn.disabled=false;
    }
  }).catch(()=>{ btn.textContent='Accept'; btn.disabled=false; });
}

// ─── FRIEND MODAL ─────────────────────────────────────────────────
function openFriendModal(){
  document.getElementById('friendModal').classList.add('open');
  fetch('/get_profile').then(r=>r.json()).then(data=>{
    if(data.success){
      document.getElementById('profileLink').textContent = window.location.origin + '/add/' + data.profile_id;
    }
  });
}

function closeFriendModal(){
  document.getElementById('friendModal').classList.remove('open');
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('usernameSearch').value = '';
}

function switchModalTab(tab){
  document.querySelectorAll('.modal-tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&tab==='search')||(i===1&&tab==='share'));
  });
  document.getElementById('searchTab').style.display = tab==='search' ? 'block' : 'none';
  document.getElementById('shareTab').style.display = tab==='share' ? 'block' : 'none';
}

let searchTimer;
function searchUsername(query){
  clearTimeout(searchTimer);
  const results = document.getElementById('searchResults');
  if(query.length < 2){ results.innerHTML=''; return; }
  searchTimer = setTimeout(()=>{
    results.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">Searching...</div>';
    fetch('/search_user?q=' + encodeURIComponent(query))
    .then(r=>r.json())
    .then(data=>{
      results.innerHTML = '';
      if(data.success && data.users && data.users.length > 0){
        data.users.forEach(u=>{
          const initials = u.name.substring(0,2).toUpperCase();
          const div = document.createElement('div');
          div.className = 'search-result';
          div.innerHTML = `
            <div class="avatar" style="background:rgba(232,25,44,0.15);color:var(--red);width:40px;height:40px;font-size:13px;">${initials}</div>
            <div class="search-result-info">
              <div class="search-result-name">${u.name}</div>
              <div class="search-result-username">@${u.username}</div>
            </div>`;
          const btn = document.createElement('button');
          btn.className = 'btn-add-small'; btn.textContent = '+ Add';
          btn.onclick = ()=>sendRequestToUser(u.profile_id, btn);
          div.appendChild(btn);
          results.appendChild(div);
        });
      } else {
        results.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No user found.</div>';
      }
    })
    .catch(()=>{ results.innerHTML = '<div style="color:var(--red);font-size:13px;">Error searching. Try again.</div>'; });
  }, 400);
}

function sendRequestToUser(profileId, btn){
  btn.textContent='Sending...'; btn.disabled=true;
  fetch('/send_friend_request',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({profile_id: profileId})
  }).then(r=>r.json()).then(data=>{
    if(data.success){ btn.textContent='✅ Sent!'; btn.style.background='#5ce65c'; btn.style.color='#080508'; }
    else { btn.textContent = data.message||'Error'; btn.disabled=false; }
  });
}

function copyLink(){
  const link = document.getElementById('profileLink').textContent;
  navigator.clipboard.writeText(link).then(()=>{
    const btn = document.querySelector('#shareTab button');
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(()=>btn.textContent=orig, 2000);
  });
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

// ─── SOCKET EVENTS (single handler for connect) ───────────────────
socket.on('connect', function(){
  console.log('🔌 Connected!');
  // Join own room
  fetch('/get_user').then(r=>r.json()).then(data=>{
    if(data.success){
      socket.emit('join', {room: data.user.email});
    }
  });
  loadFriends();
  loadFriendRequests();
});

socket.on('message', data=>{
  addMessage(data.text, 'received');
  if(aiOn) setTimeout(()=>getAISuggestions(data.text), 400);
});

// ─── INIT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  loadFriends();
  loadFriendRequests();
});

// Refresh friends/requests every 8s
setInterval(()=>{ loadFriends(); loadFriendRequests(); }, 8000);
</script>
